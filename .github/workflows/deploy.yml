name: Deploy to GitHub Pages

# サイト（index.html 等）を GitHub Pages に公開する。
on:
  # 通常の push（手動編集やこのファイルの更新）で再デプロイ
  push:
    branches: [main]
  # 「Generate Music」が完了したら再デプロイする。
  # ※Actions(bot) の自動コミットは push イベントを発火しないため、
  #   生成ワークフローの完了を合図にして新曲をサイトへ反映する。
  workflow_run:
    workflows: ["Generate Music"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 進行中のデプロイをキャンセルせず、順番に反映する
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ全体を静的サイトとして公開（index.html と data/ を含む）
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
